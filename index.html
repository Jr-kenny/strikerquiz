<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>strikerlab - The Ultimate Football Quiz</title>
    <meta
      name="description"
      content="Test your football knowledge with the ultimate football quiz game. Leagues, players, managers, trophies and more!"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: {
                50: "#eff6ff",
                100: "#dbeafe",
                500: "#3b82f6",
                600: "#2563eb",
                700: "#1d4ed8",
                900: "#1e3a8a"
              },
              accent: { 400: "#fbbf24", 500: "#f59e0b", 600: "#d97706" }
            },
            fontFamily: {
              sans: [
                "Barlow Condensed",
                "ui-sans-serif",
                "system-ui",
                "sans-serif"
              ],
              display: [
                "Bebas Neue",
                "Barlow Condensed",
                "ui-sans-serif",
                "system-ui",
                "sans-serif"
              ]
            },
            animation: {
              "fade-in": "fadeIn 0.4s ease-out",
              "slide-up": "slideUp 0.4s ease-out",
              "bounce-in": "bounceIn 0.5s ease-out",
              "pulse-slow": "pulse 3s infinite"
            },
            keyframes: {
              fadeIn: { from: { opacity: "0" }, to: { opacity: "1" } },
              slideUp: {
                from: { opacity: "0", transform: "translateY(20px)" },
                to: { opacity: "1", transform: "translateY(0)" }
              },
              bounceIn: {
                "0%": { transform: "scale(0.8)", opacity: "0" },
                "60%": { transform: "scale(1.05)" },
                "100%": { transform: "scale(1)", opacity: "1" }
              }
            }
          }
        }
      };
    </script>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body
    class="app-base text-gray-900 dark:text-gray-100 min-h-screen transition-colors duration-300"
  >
    <div id="app"></div>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
